<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trapèze sangles — Valentine Yvin, artiste de cirque aérienne." />
    <title>Trapèze sangles — Valentine Yvin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="trapezeSangles">
    <div id="site-header"></div>

    <main>
      <header class="page-hero container reveal">
        <p class="section-label" data-i18n="specialties.label">Disciplines</p>
        <h1 data-i18n="specialty.trapezeSangles.title">Trapèze sangles</h1>
        <p class="section-intro" data-i18n="specialty.trapezeSangles.intro"></p>
      </header>

      <section class="discipline-mosaic container reveal">
        <div class="mosaic-grid">
          <img src="assets/images/trapeze-sangles/01.jpg" alt="" loading="lazy" />
          <img src="assets/images/trapeze-sangles/02.jpg" alt="" loading="lazy" />
          <img src="assets/images/trapeze-sangles/03.jpg" alt="" loading="lazy" />
          <img src="assets/images/trapeze-sangles/04.jpg" alt="" loading="lazy" />
          <img src="assets/images/trapeze-sangles/05.jpg" alt="" loading="lazy" />
        </div>
      </section>

      <section class="acts-section">
        <div class="container">
          <p class="section-label" data-i18n="acts.label">Numéros</p>

          <article class="act reveal">
            <h2 class="act-title" data-i18n="specialty.trapezeSangles.act1title"></h2>
            <p class="act-desc" data-i18n="specialty.trapezeSangles.act1desc"></p>
            <div class="act-gallery">
              <img src="assets/images/trapeze-sangles/01.jpg" alt="" loading="lazy" />
              <img src="assets/images/trapeze-sangles/02.jpg" alt="" loading="lazy" />
              <img src="assets/images/trapeze-sangles/03.jpg" alt="" loading="lazy" />
              <img src="assets/images/trapeze-sangles/04.jpg" alt="" loading="lazy" />
            </div>
            <div class="act-video">
              <a
                class="act-video-link"
                href="https://www.youtube.com/channel/UCDN5LKlx5cKHbzyabUa4a5w/videos"
                target="_blank"
                rel="noopener"
              >
                <div class="act-video-thumb">
                  <img src="assets/images/trapeze-sangles/05.jpg" alt="" loading="lazy" />
                  <span class="act-video-play" aria-hidden="true">▶</span>
                </div>
                <div class="act-video-meta">
                  <strong data-i18n="acts.watchVideo">Voir la vidéo du numéro</strong>
                  <span data-i18n="acts.videoPlaceholder">Vidéo à venir — chaîne YouTube</span>
                </div>
              </a>
            </div>
          </article>
        </div>
      </section>

      <section class="page-cta container reveal">
        <p data-i18n="specialty.trapezeSangles.ctaSub"></p>
        <a href="index.html#contact" class="btn-cta" data-page-href="index.html#contact" data-i18n="specialty.trapezeSangles.cta">Contact</a>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/layout.js"></script>
  </body>
</html>
